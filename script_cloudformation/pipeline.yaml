AWSTemplateFormatVersion: '2010-09-09'
Description: >-
  Pipeline stack - Lambdas, Glue (Crawlers/Catálogo) e Athena.

Parameters:
  BronzeBucketName:
    Type: String
    Default: s3-asset-sirius-bucket-bronze
    Description: Nome do bucket S3 Bronze

  SilverBucketName:
    Type: String
    Default: s3-asset-sirius-bucket-silver
    Description: Nome do bucket S3 Silver

  GoldBucketName:
    Type: String
    Default: s3-asset-sirius-bucket-gold
    Description: Nome do bucket S3 Gold

  LambdaExecutionRoleArn:
    Type: String
    Default: arn:aws:iam::852131219041:role/LabRole
    Description: ARN opcional do IAM Role usado pelas funções Lambda (deixe vazio para usar a role na conta atual)

  LambdaExecutionRoleName:
    Type: String
    Default: LabRole
    Description: Nome do IAM Role usado pelas funções Lambda na conta atual (quando LambdaExecutionRoleArn estiver vazio)

  GlueRoleArn:
    Type: String
    Default: arn:aws:iam::852131219041:role/LabRole
    Description: ARN opcional do IAM Role usado pelos Crawlers do Glue (deixe vazio para usar a role na conta atual)

  GlueRoleName:
    Type: String
    Default: LabRole
    Description: Nome do IAM Role usado pelos Crawlers do Glue na conta atual (quando GlueRoleArn estiver vazio)

  AthenaResultsPrefix:
    Type: String
    Default: wide-tables/
    Description: Prefixo dentro do bucket para resultados do Athena

Conditions:
  HasLambdaExecutionRoleArn: !Not [!Equals [!Ref LambdaExecutionRoleArn, '']]
  HasGlueRoleArn: !Not [!Equals [!Ref GlueRoleArn, '']]

Resources:
  # ---------------------------
  # Funções Lambda
  # ---------------------------

  IngestionLambdaFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub asset-sirius-lambda-ingestion-${AWS::Region}
      Runtime: python3.12
      Handler: index.lambda_handler
      Role: !If
        - HasLambdaExecutionRoleArn
        - !Ref LambdaExecutionRoleArn
        - !Sub arn:aws:iam::${AWS::AccountId}:role/${LambdaExecutionRoleName}
      Timeout: 240
      MemorySize: 2024
      EphemeralStorage:
        Size: 3024
      Code:
        ZipFile: |
          def lambda_handler(event, context):
              return {
                  "statusCode": 200,
                  "body": "Ingestion Lambda executada com sucesso"
              }
      Environment:
        Variables:
          BRONZE_BUCKET: !Ref BronzeBucketName

  EtlLambdaFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub asset-sirius-lambda-etl-${AWS::Region}
      Runtime: python3.12
      Handler: index.lambda_handler
      Role: !If
        - HasLambdaExecutionRoleArn
        - !Ref LambdaExecutionRoleArn
        - !Sub arn:aws:iam::${AWS::AccountId}:role/${LambdaExecutionRoleName}
      Timeout: 600
      MemorySize: 5024
      EphemeralStorage:
        Size: 5024
      Code:
        ZipFile: |
          def lambda_handler(event, context):
              return {
                  "statusCode": 200,
                  "body": "ETL Lambda executada com sucesso"
              }
      Environment:
        Variables:
          BRONZE_BUCKET: !Ref BronzeBucketName
          SILVER_BUCKET: !Ref SilverBucketName
      Layers:
        - arn:aws:lambda:us-east-1:336392948345:layer:AWSSDKPandas-Python314:4

  WideTableLambdaFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub asset-sirius-lambda-wide-table-${AWS::Region}
      Runtime: python3.12
      Handler: index.lambda_handler
      Role: !If
        - HasLambdaExecutionRoleArn
        - !Ref LambdaExecutionRoleArn
        - !Sub arn:aws:iam::${AWS::AccountId}:role/${LambdaExecutionRoleName}
      Timeout: 60
      MemorySize: 1024
      EphemeralStorage:
        Size: 2024
      Code:
        ZipFile: |
          def lambda_handler(event, context):
              return {
                  "statusCode": 200,
                  "body": "Wide Table Lambda executada com sucesso"
              }
      Environment:
        Variables:
          SILVER_BUCKET: !Ref SilverBucketName
          GOLD_BUCKET: !Ref GoldBucketName
      Layers:
        - arn:aws:lambda:us-east-1:336392948345:layer:AWSSDKPandas-Python314:4

  InsertionLambdaFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub asset-sirius-lambda-insertion-${AWS::Region}
      Runtime: python3.12
      Handler: index.lambda_handler
      Role: !If
        - HasLambdaExecutionRoleArn
        - !Ref LambdaExecutionRoleArn
        - !Sub arn:aws:iam::${AWS::AccountId}:role/${LambdaExecutionRoleName}
      Timeout: 900
      MemorySize: 512
      Code:
        ZipFile: |
          def lambda_handler(event, context):
              return {
                  "statusCode": 200,
                  "body": "Insertion Lambda executada com sucesso"
              }
      Environment:
        Variables:
          GOLD_BUCKET: !Ref GoldBucketName

  # ---------------------------
  # Permissões Lambda para S3 (Triggers S3 -> Lambda)
  # ---------------------------

  InsertionLambdaS3Permission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref InsertionLambdaFunction
      Principal: s3.amazonaws.com
      SourceArn: !Sub arn:aws:s3:::${GoldBucketName}

  # ---------------------------
  # Glue Data Catalog - Databases
  # ---------------------------

  GlueDatabaseGold:
    Type: AWS::Glue::Database
    Properties:
      CatalogId: !Ref AWS::AccountId
      DatabaseInput:
        Name: asset_sirius_gold
        Description: Database Glue para camada Gold

  # ---------------------------
  # Athena WorkGroup
  # ---------------------------

  AthenaWorkGroup:
    Type: AWS::Athena::WorkGroup
    Properties:
      Name: asset-sirius-athena-wg
      Description: WorkGroup do Athena para acessar o catálogo Glue do Asset Sirius
      State: ENABLED
      WorkGroupConfiguration:
        EnforceWorkGroupConfiguration: true
        ResultConfiguration:
          OutputLocation: !Sub s3://${GoldBucketName}/${AthenaResultsPrefix}

Outputs:
  IngestionLambdaArn:
    Description: ARN da Lambda de Ingestão
    Value: !GetAtt IngestionLambdaFunction.Arn
    Export:
      Name: asset-sirius-IngestionLambdaArn

  EtlLambdaArn:
    Description: ARN da Lambda de ETL
    Value: !GetAtt EtlLambdaFunction.Arn
    Export:
      Name: asset-sirius-EtlLambdaArn

  WideTableLambdaArn:
    Description: ARN da Lambda de Wide Table
    Value: !GetAtt WideTableLambdaFunction.Arn
    Export:
      Name: asset-sirius-WideTableLambdaArn

  InsertionLambdaArn:
    Description: ARN da Lambda de Inserção
    Value: !GetAtt InsertionLambdaFunction.Arn
    Export:
      Name: asset-sirius-InsertionLambdaArn

  GlueDatabaseGoldName:
    Description: Nome do database Glue Gold
    Value: !Ref GlueDatabaseGold

  AthenaWorkGroupName:
    Description: Nome do WorkGroup do Athena
    Value: !Ref AthenaWorkGroup

